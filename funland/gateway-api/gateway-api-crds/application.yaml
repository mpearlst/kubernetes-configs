apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mpearlst/kubernetes-configs.git
    targetRevision: HEAD
    path: funland/gateway-api/gateway-api-crds/crds
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-api
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
