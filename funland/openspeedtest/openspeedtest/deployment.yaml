apiVersion: apps/v1
kind: Deployment
metadata:
  name: openspeedtest
  namespace: openspeedtest
  labels:
    app.kubernetes.io/name: openspeedtest
    app.kubernetes.io/instance: openspeedtest
    # renovate: image=openspeedtest/latest
    app.kubernetes.io/version: "v2.0.6"
    app.kubernetes.io/component: speed-test
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  revisionHistoryLimit: 1
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openspeedtest
      app.kubernetes.io/instance: openspeedtest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openspeedtest
        app.kubernetes.io/instance: openspeedtest
        # renovate: image=openspeedtest/latest
        app.kubernetes.io/version: "v2.0.6"
        app.kubernetes.io/component: speed-test
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/managed-by: argocd
    spec:
      automountServiceAccountToken: false
      containers:
        - name: openspeedtest
          image: openspeedtest/latest:v2.0.6
          ports:
            - containerPort: 3000
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-conf-d
              mountPath: /etc/nginx/conf.d
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-conf-d
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
