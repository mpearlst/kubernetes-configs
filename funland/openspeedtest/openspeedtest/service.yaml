apiVersion: v1
kind: Service
metadata:
  name: openspeedtest
  namespace: openspeedtest
  labels:
    app.kubernetes.io/name: openspeedtest
    app.kubernetes.io/instance: openspeedtest
    app.kubernetes.io/component: speed-test
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openspeedtest
    app.kubernetes.io/instance: openspeedtest
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: openspeedtest-lb
  namespace: openspeedtest
  labels:
    app.kubernetes.io/name: openspeedtest
    app.kubernetes.io/instance: openspeedtest
    app.kubernetes.io/component: speed-test
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.101.6
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: openspeedtest
    app.kubernetes.io/instance: openspeedtest
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
