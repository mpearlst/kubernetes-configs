# talhelper config - source of truth for the Talos OS and Kubernetes versions.
#
# talosVersion/kubernetesVersion are watched by Renovate (see .github/renovate.json)
# so version bumps show up as PRs instead of drifting silently. Merging a bump PR
# does NOT upgrade anything by itself - see the "Upgrading Talos & Kubernetes"
# section in the README for the manual runbook.
#
# IMPORTANT: before merging this file for the first time, set talosVersion and
# kubernetesVersion below to whatever the cluster is ACTUALLY running today, so
# the first Renovate diff reflects a real upgrade rather than a fabricated jump.
clusterName: funland
talosVersion: v1.13.6
kubernetesVersion: v1.36.3
endpoint: https://192.168.10.20:6443
allowSchedulingOnControlPlanes: false

nodes:
  - hostname: talos-g4c-g4l
    ipAddress: 192.168.10.20
    controlPlane: true
    installDisk: /dev/sda
  - hostname: talos-worker1
    ipAddress: 192.168.10.21
    controlPlane: false
    installDisk: /dev/sda
  - hostname: talos-worker2
    ipAddress: 192.168.10.22
    controlPlane: false
    installDisk: /dev/sda
  - hostname: talos-worker3
    ipAddress: 192.168.10.23
    controlPlane: false
    installDisk: /dev/sda

# Reproduces the existing bootstrap patch from the README (disable the default
# CNI and kube-proxy so Cilium can replace both).
patches:
  - |-
    cluster:
      network:
        cni:
          name: none
      proxy:
        disabled: true

# Longhorn requires these Talos system extensions on every node (control plane
# included, so Longhorn's manager/CSI components run cluster-wide even though
# workloads themselves won't be scheduled on the control plane), plus
# qemu-guest-agent since every node is a QEMU VM. talhelper resolves this into
# a schematic ID via the Talos Image Factory automatically when running
# `talhelper genconfig` - no manual schematic lookup needed.
#
# NOTE: this must live under controlPlane/worker (or per-node), NOT as a
# top-level `schematic:` key - talhelper's config schema doesn't have a
# top-level schematic field, and silently ignores unrecognized keys instead
# of erroring, which is what happened here originally.
controlPlane:
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/iscsi-tools
          - siderolabs/util-linux-tools
          - siderolabs/qemu-guest-agent

worker:
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/iscsi-tools
          - siderolabs/util-linux-tools
          - siderolabs/qemu-guest-agent
