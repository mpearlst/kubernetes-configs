apiVersion: v1
kind: Namespace
metadata:
  name: etcd-operator
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: etcd-operator-application
  namespace: argocd
spec:
  destination:
    namespace: etcd-operator
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: etcd-operator
    repoURL: ghcr.io/aenix-io/charts
    targetRevision: 0.4.2
    helm:
      valuesObject:
        kubeRbacProxy:
          vpa:
            enabled: false
        etcdOperator:
          vpa:
            enabled: false
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec
        - .status
        - .metadata.annotations
        - .metadata.labels
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
