apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gravity
  namespace: gravity
spec:
  parentRefs:
    - name: internal
      namespace: gateway
      sectionName: https
  hostnames:
    - "gravity.batlab.io"
  rules:
    - backendRefs:
        - name: gravity-http
          port: 8008
