apiVersion: v1
kind: ServiceAccount
metadata:
  name: emergency-admin
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: emergency-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: emergency-admin
    namespace: default
---
apiVersion: v1
kind: Secret
metadata:
  name: emergency-admin-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: emergency-admin
type: kubernetes.io/service-account-token
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: emergency-admin-push
  namespace: default
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: "1m"
  secretStoreRefs:
    - name: 1password
      kind: ClusterSecretStore
  selector:
    secret:
      name: emergency-admin-token
  template:
    data:
      _metadata_origin: "push"
      token: "{{ .token | toString }}"
  data:
    - match:
        secretKey: token
        remoteRef:
          remoteKey: emergency-k8s-token
          property: token
