apiVersion: v1
kind: Namespace
metadata:
  name: gravity
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gravity
  namespace: gravity
  labels:
    app.kubernetes.io/name: gravity
spec:
  revisionHistoryLimit: 1
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: gravity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gravity
    spec:
      containers:
      - image: ghcr.io/beryju/gravity:stable
        name: gravity
        env:
        - name: BOOTSTRAP_ROLES
          value: "dns;api;discovery;backup;monitoring;tsdb"
        - name: ETCD_ENDPOINT
          value: "gravity-etcd:2379"
        - name: INSTANCE_LISTEN
          value: "0.0.0.0"
        ports:
        - containerPort: 53
          protocol: TCP
          name: dns-tcp
        - containerPort: 53
          protocol: UDP
          name: dns-udp
        - containerPort: 8008
          protocol: TCP
          name: http
        - containerPort: 8009
          protocol: TCP
          name: metrics
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        securityContext:
          capabilities:
            drop: [ALL]
            add: [NET_BIND_SERVICE]
          readOnlyRootFilesystem: false
          privileged: false
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /healthz/live
            port: 8009
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz/ready
            port: 8009
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
